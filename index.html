<!DOCTYPE html>
<html>
<head>
  <title>My GitHub Pages with Google Search</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f9f9f9;
      text-align: center;
    }
    h1 {
      color: #333;
    }
    /* Style for the search container */
    .gcse-search {
      max-width: 800px;
      margin: 20px auto;
      padding: 10px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    /* Optional: style for search input and results */
  </style>
</head>
<body>
<h1>Search My Site</h1>
<div class="gcse-search"></div>
<script async src="https://cse.google.com/cse.js?cx=YOUR_CSE_ID"></script>
<!-- Replace 'YOUR_CSE_ID' with your actual Google CSE ID -->
</body>
</html>
