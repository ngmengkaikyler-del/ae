<!DOCTYPE html>
<html>
<head>
  <title>My GitHub Pages with Google Search</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f9f9f9;
      text-align: center;
    }
    h1 {
      color: #333;
    }
    /* Center the search box */
    .gcse-searchbox-only {
      max-width: 600px;
      margin: 20px auto;
    }
  </style>
</head>
<body>
<h1>Search My Site</h1>
<!-- Google Search Box -->
<gcse:searchbox-only></gcse:searchbox-only>
<!-- Load the Google CSE script with your CSE ID -->
<script async src="https://cse.google.com/cse.js?cx=YOUR_CSE_ID"></script>
</body>
</html>
